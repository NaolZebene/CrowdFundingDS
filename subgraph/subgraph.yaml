specVersion: 1.3.0
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: CrowdVault
    network: sepolia
    source:
      address: "0x667bB28aA3e9382885A76c8893Bcd2a05B51498a"
      abi: CrowdVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Project
        - ProjectUser
        - Investment
        - YieldClaim
        - VetoVote
      abis:
        - name: CrowdVault
          file: ./abis/CrowdVault.json
      eventHandlers:
        - event: ProjectCreated(indexed uint256,address,address,uint256,string,string,string,string)
          handler: handleProjectCreated
        - event: ProjectApproved(indexed uint256)
          handler: handleProjectApproved
        - event: ProjectRegistered(indexed uint256,indexed address)
          handler: handleProjectRegistered
        - event: Invested(indexed uint256,indexed address,uint256)
          handler: handleInvested
        - event: Refunded(indexed uint256,indexed address,uint256)
          handler: handleRefunded
        - event: MilestoneVerified(indexed uint256,indexed uint256)
          handler: handleMilestoneVerified
        - event: ReleaseRequested(indexed uint256,indexed uint256,uint256)
          handler: handleReleaseRequested
        - event: FundsReleased(indexed uint256,indexed uint256,uint256,address)
          handler: handleFundsReleased
        - event: VetoedEvent(indexed uint256,indexed address)
          handler: handleVetoedEvent
        - event: VetoCleared(indexed uint256,indexed address)
          handler: handleVetoCleared
        - event: YieldClaimed(indexed address,uint256)
          handler: handleYieldClaimed
      file: ./src/mapping.ts

  - kind: ethereum/contract
    name: CommitmentAMM
    network: sepolia
    source:
      address: "0x8cAD9636362dC69beaA36E39D8e58a9Bd79Ea75a"
      abi: CommitmentAMM
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Pool
        - Swap
        - PoolHourData
        - PoolDayData
      abis:
        - name: CommitmentAMM
          file: ./abis/CommitmentAMM.json
      eventHandlers:
        - event: Seeded(indexed uint256,uint256,uint256)
          handler: handleSeeded
        - event: LiquidityRemoved(indexed uint256,uint256,uint256)
          handler: handleLiquidityRemoved
        - event: FeeSet(uint256)
          handler: handleFeeSet
        - event: Swap(indexed uint256,indexed address,address,uint256,address,uint256)
          handler: handleSwap
      file: ./src/mapping.ts
